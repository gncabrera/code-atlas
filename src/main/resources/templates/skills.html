<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Code Atlas - Skills</title>
    <th:block th:replace="~{fragments/head :: pageHead('skills.css')}"></th:block>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-4">
    <h1 class="mb-3">Skills</h1>

    <div class="card mb-4">
        <div class="card-header">Install Skills to Project</div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-6">
                    <label for="installProjectId" class="form-label">Project</label>
                    <select id="installProjectId" class="form-select">
                        <option value="">— Select project —</option>
                        <option th:each="p : ${projects}" th:value="${p.id}" th:text="${p.name}"></option>
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label">Skills to install</label>
                    <div id="skillInstallCheckboxes" class="skill-install-checkboxes"></div>
                </div>
            </div>
            <div class="mt-3">
                <button id="btn-install-skills" type="button" class="btn btn-primary">Install</button>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span>Skill List</span>
            <button id="btn-create-skill" type="button" class="btn btn-sm btn-primary">Create Skill</button>
        </div>
        <div class="card-body table-responsive">
            <table class="table table-striped align-middle">
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Target Path</th>
                    <th>Description</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody id="skillsTableBody"></tbody>
            </table>
        </div>
    </div>
</main>

<div class="modal fade" id="skillFormModal" tabindex="-1" aria-labelledby="skillFormModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="skillFormModalLabel">Skill</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <input id="skillId" type="hidden">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="skillName" class="form-label">Name</label>
                        <input id="skillName" class="form-control" type="text" placeholder="architect">
                    </div>
                    <div class="col-md-6">
                        <label for="skillCategory" class="form-label">Category</label>
                        <input id="skillCategory" class="form-control" type="text" placeholder="base, overlay, general">
                    </div>
                    <div class="col-12">
                        <label for="skillTargetPath" class="form-label">Target Path</label>
                        <input id="skillTargetPath" class="form-control" type="text"
                               placeholder=".cursor/skills/architect/SKILL.md">
                    </div>
                    <div class="col-12">
                        <label for="skillDescription" class="form-label">Description</label>
                        <textarea id="skillDescription" class="form-control" rows="2"></textarea>
                    </div>
                    <div class="col-12">
                        <label for="skillPrompt" class="form-label">Prompt</label>
                        <textarea id="skillPrompt" class="form-control skill-prompt-textarea" rows="12"></textarea>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="resetSkillBtn" type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                <button id="saveSkillBtn" type="button" class="btn btn-primary">Save</button>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="~{fragments/scripts :: pageScripts('skills.js')}"></th:block>
</body>
</html>
