<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Code Atlas - Prompt Optimizer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.8/dist/brite/bootstrap.min.css">
    <link rel="stylesheet" href="/css/prompt-optimizer.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-4">
    <h1 class="mb-3">Prompt Optimizer</h1>
    <p class="text-muted">Build deterministic preview and send exact prompt text to selected AI model.</p>

    <div id="globalAlert" class="alert d-none" role="alert"></div>

    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <label for="projectSelect" class="form-label">Project</label>
            <select id="projectSelect" class="form-select">
                <option value="">No project</option>
            </select>
        </div>
        <div class="col-md-4">
            <label for="promptModeSelect" class="form-label">Prompt Mode</label>
            <select id="promptModeSelect" class="form-select">
                <option value="BALANCED" selected>balanced</option>
                <option value="CHEAP">cheap</option>
                <option value="ARCHITECT">architect</option>
                <option value="IMPLEMENTATION">implementation</option>
                <option value="REVIEWER">reviewer</option>
                <option value="REFACTOR">refactor</option>
                <option value="SECURITY">security</option>
            </select>
        </div>
        <div class="col-md-4 d-flex align-items-end">
            <div id="agentsCheckboxWrapper" class="form-check">
                <input class="form-check-input" type="checkbox" value="" id="shouldSendAgentsFile" checked>
                <label class="form-check-label" for="shouldSendAgentsFile">
                    Send Project AGENTS.md
                </label>
            </div>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-header">1. Your Prompt (UserRequest)</div>
        <div class="card-body">
            <textarea id="userRequest" class="form-control mb-3" rows="7"
                      placeholder="Enter raw implementation request..."></textarea>
            <button id="buildPreviewBtn" class="btn btn-primary">Build Preview</button>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-header">2. What Will Be Sent To AIModel (AIModelPrompt)</div>
        <div class="card-body">
            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label for="aiModelSelect" class="form-label">AI Model</label>
                    <select id="aiModelSelect" class="form-select"></select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Token Estimation</label>
                    <div class="form-control">
                        Estimated tokens: <span id="estimatedTokens">0</span>
                        <span class="mx-2">|</span>
                        Model limit (tokensPerMinute): <span id="tokenLimit">0</span>
                    </div>
                </div>
            </div>
            <textarea id="aiModelPrompt" class="form-control mb-3" rows="9"
                      placeholder="Preview prompt or edit before send..."></textarea>
            <button id="sendToModelBtn" class="btn btn-success">Send To AIModel</button>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-header">3. Optimized Prompt (OutputPrompt)</div>
        <div class="card-body">
            <textarea id="outputPrompt" class="form-control mb-3" rows="9"
                      placeholder="Model response..." ></textarea>
            <button id="copyOutputBtn" class="btn btn-outline-secondary">Copy</button>
        </div>
    </div>
</main>

<th:block th:replace="~{fragments/scripts :: pageScripts('prompt-optimizer.js')}"></th:block>
</body>
</html>
