<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Code Atlas - Prompt Optimizer Modes</title>
    <th:block th:replace="~{fragments/head :: pageHead('prompt-optimizer-modes.css')}"></th:block>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-4">
    <h1 class="mb-3">Prompt Optimizer Modes</h1>
    <p class="text-muted">Manage prompt templates used by the Prompt Optimizer. System modes are read-only except visibility.</p>

    <div class="card mb-4">
        <div class="card-header">Mode Form</div>
        <div class="card-body">
            <input id="modeId" type="hidden">
            <div id="readOnlyNotice" class="alert alert-info alert-dismissible fade show d-none" role="alert" data-alert-persist="false">
                System read-only mode: only the Hidden flag can be changed.
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            <div class="row g-3">
                <div class="col-md-3">
                    <label for="modeCode" class="form-label">Code</label>
                    <input id="modeCode" class="form-control" type="text" placeholder="CUSTOM_MODE">
                </div>
                <div class="col-md-3">
                    <label for="modeName" class="form-label">Display Name</label>
                    <input id="modeName" class="form-control" type="text" placeholder="Custom Mode">
                </div>
                <div class="col-12">
                    <label for="modePrompt" class="form-label">Prompt Template</label>
                    <textarea id="modePrompt" class="form-control" rows="10"
                              placeholder="Template with {{ USER_REQUEST }}, {{ CONTEXT }}, {{ AGENTS_FILE }} placeholders"></textarea>
                </div>
                <div class="col-12">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="modeHidden">
                        <label class="form-check-label" for="modeHidden">Hidden (excluded from Prompt Optimizer dropdown)</label>
                    </div>
                </div>
            </div>
            <div class="mt-3 d-flex gap-2">
                <button id="saveModeBtn" class="btn btn-primary">Save</button>
                <button id="resetModeBtn" class="btn btn-outline-secondary">Reset</button>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">Mode List</div>
        <div class="card-body table-responsive">
            <table class="table table-striped align-middle">
                <thead>
                <tr>
                    <th>Code</th>
                    <th>Name</th>
                    <th>Hidden</th>
                    <th>Read-only</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody id="modesTableBody"></tbody>
            </table>
        </div>
    </div>
</main>

<div th:replace="~{fragments/scripts :: pageScripts('prompt-optimizer-modes.js')}"></div>
</body>
</html>
