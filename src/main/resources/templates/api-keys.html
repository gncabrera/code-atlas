<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Code Atlas - API Keys</title>
    <th:block th:replace="~{fragments/head :: pageHead('api-keys.css')}"></th:block>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-4">
    <h1 class="mb-3">API Keys</h1>
    <div class="alert alert-info" role="alert">
        <i class="bi bi-lightbulb me-1" aria-hidden="true"></i>
        Create an API key from
        <a href="https://aistudio.google.com/api-keys" target="_blank" rel="noopener noreferrer">
            Google AI Studio <i class="bi bi-box-arrow-up-right" aria-hidden="true"></i>
        </a>.
    </div>
    <div class="alert alert-warning" role="alert">
        <i class="bi bi-exclamation-triangle me-1" aria-hidden="true"></i>
        Keys stored locally in SQLite — protect <code>data/app.db</code>.
    </div>
    <div class="card mb-4">
        <div class="card-header">API Key Form</div>
        <div class="card-body">
            <input id="apiKeyId" type="hidden">
            <div class="row g-3">
                <div class="col-md-4">
                    <label for="apiKeyName" class="form-label">Name</label>
                    <input id="apiKeyName" class="form-control" type="text" maxlength="100">
                    <div class="form-text">One key can link to multiple AI models.</div>
                </div>
                <div class="col-md-4">
                    <label for="apiKeyProvider" class="form-label">Provider</label>
                    <input id="apiKeyProvider" class="form-control" type="text" maxlength="50" placeholder="Gemini">
                    <div class="form-text">Provider <code>Gemini</code> + Active required for linked models.</div>
                </div>
                <div class="col-md-4">
                    <label for="apiKeyValue" class="form-label">API Key</label>
                    <input id="apiKeyValue" class="form-control" type="text" maxlength="255">
                </div>
                <div class="col-12">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="apiKeyActive" checked>
                        <label class="form-check-label" for="apiKeyActive">Active</label>
                    </div>
                </div>
            </div>
            <div class="mt-3 d-flex gap-2">
                <button id="saveApiKeyBtn" class="btn btn-primary">Save</button>
                <button id="resetApiKeyBtn" class="btn btn-outline-secondary">Reset</button>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">API Key List</div>
        <div class="card-body table-responsive">
            <table class="table table-striped align-middle">
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Provider</th>
                    <th>API Key</th>
                    <th>Active</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody id="apiKeysTableBody"></tbody>
            </table>
        </div>
    </div>
</main>

<th:block th:replace="~{fragments/scripts :: pageScripts('api-keys.js')}"></th:block>
</body>
</html>
